name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gracekelly
          POSTGRES_PASSWORD: gracekelly
          POSTGRES_DB: gracekelly_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,postgres]"

      - name: Lint with ruff
        run: python -m ruff check src/ tests/

      - name: Type check with mypy
        run: python -m mypy src/gracekelly/ --ignore-missing-imports

      - name: Run tests
        run: python -m pytest -q

      - name: Run PostgreSQL integration tests
        env:
          GRACEKELLY_POSTGRES_TEST_DSN: postgresql://gracekelly:gracekelly@localhost:5432/gracekelly_test
        run: python -m pytest tests/test_postgres_live.py -v

      - name: Import check
        run: python -c "from gracekelly.main import create_app; app = create_app(); print(f'OK: {len(app.routes)} routes')"
